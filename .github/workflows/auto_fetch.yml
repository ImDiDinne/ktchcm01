name: Auto Fetch Data (Metabase)

on:
  schedule:
    - cron: '*/15 * * * *' # Chạy mỗi 15 phút
  workflow_dispatch: # Cho phép bấm chạy bằng tay từ Github Actions
  repository_dispatch:
    types: [trigger_auto_fetch]

jobs:
  fetch_data:
    runs-on: ubuntu-latest

    permissions:
      contents: write # Cấp quyền cho GitHub Actions được phép commit và push code
      actions: write # Cấp quyền kích hoạt workflow khác

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests pandas openpyxl

      - name: Run Auto Fetch Script
        env:
          METABASE_USERNAME: ${{ secrets.METABASE_USERNAME }}
          METABASE_PASSWORD: ${{ secrets.METABASE_PASSWORD }}
          METABASE_SESSION: ${{ secrets.METABASE_SESSION }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python auto_fetch_data.py --run-export

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add tonkho_data.js tonkho_tuyen.json Datatonkho.xlsx BaoCao_TonKho.xlsx mapping_params.csv || true
          
          # Chỉ commit nếu có file thay đổi
          if ! git diff --staged --quiet; then
            git commit -m "chore(data): auto-update from GitHub Actions"
            git push origin HEAD:main
          else
            echo "Không có dữ liệu mới để commit."
          fi

      - name: Trigger Remote Login on Failure
        if: failure()
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'remote_login.yml',
              ref: 'main'
            })
