name: 🔄 Auto Update Inventory Data

on:
  schedule:
    # Tự động cập nhật mỗi 10 phút
    - cron: '*/10 * * * *'
  workflow_dispatch: # Cho phép nhấn nút "Run workflow" để chạy cập nhật chủ động bất cứ lúc nào

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
    - name: 📂 Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: 🐍 Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 📦 Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas openpyxl requests

    - name: 🔄 Fetch and Process Data
      env:
        METABASE_USERNAME: ${{ secrets.METABASE_USERNAME }}
        METABASE_PASSWORD: ${{ secrets.METABASE_PASSWORD }}
        METABASE_SESSION: ${{ secrets.METABASE_SESSION }}
      run: |
        python auto_fetch_data.py --run-export

    - name: 🔑 Auto-Renew Session Secret (nếu token mới được tạo)
      if: always()
      env:
        GH_TOKEN: ${{ secrets.GH_PAT }}
      run: |
        if [ -f ".session_token" ]; then
          NEW_TOKEN=$(cat .session_token)
          echo "🔑 Phát hiện session token mới: ${NEW_TOKEN:0:8}..."
          
          if [ -n "$GH_TOKEN" ]; then
            # Cập nhật GitHub Secret bằng GitHub CLI
            echo "$NEW_TOKEN" | gh secret set METABASE_SESSION --repo ${{ github.repository }}
            echo "✅ Đã tự động cập nhật METABASE_SESSION trong GitHub Secrets!"
          else
            echo "⚠️ Chưa có GH_PAT secret — không thể tự cập nhật Secrets."
            echo "   Hãy thêm Personal Access Token vào repo secret với tên GH_PAT"
            echo "   (cần quyền: repo, admin:org → secrets)"
          fi
          
          # Xóa file token (không commit)
          rm -f .session_token
        else
          echo "ℹ️ Không có token mới — session hiện tại vẫn hợp lệ."
        fi

    - name: 🚀 Commit & Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        git add -f tonkho_data.js tonkho_tuyen.json BaoCao_TonKho.xlsx
        if git diff --staged --quiet; then
          echo "✅ No changes in data files. Skipping commit."
        else
          git commit -m "chore(data): auto-update inventory data [skip ci]"
          # Pull rebase trước để tránh conflict với local pushes
          git pull origin main --rebase --strategy-option=theirs || true
          git push origin main
          echo "🚀 Data pushed successfully!"
        fi
