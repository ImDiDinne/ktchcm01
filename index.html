<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KTC HCM 01 — Tổng Quan Hàng Hoá</title>
  <meta name="description" content="Dashboard tổng quan hàng hoá tại Kho Trung Chuyển Hồ Chí Minh 01 — GHN Express">
  <link rel="stylesheet" href="style.css">
  <script src="tonkho_data.js"></script>
</head>
<body>
  <div class="dashboard" id="dashboard">

    <!-- ═══ Header ═══ -->
    <header class="header animate-in" id="header">
      <div class="header-left">
        <div class="header-logo">📦</div>
        <div class="header-title">
          <h1>KTC HCM 01</h1>
          <div class="subtitle">Kho Trung Chuyển Hồ Chí Minh 01 — Tổng Quan Hàng Hoá</div>
        </div>
      </div>
      <div class="header-right">
        <div class="update-badge" id="update-badge">
          <span class="dot"></span>
          <span id="update-time">—</span>
        </div>
      </div>
    </header>

    <!-- ═══ Filter Container ═══ -->
    <div class="filter-container animate-in delay-1" id="filter-container">
      <div class="filter-label">
        <span class="icon">🏷️</span> Phân Loại Hàng Hóa:
      </div>
      <div class="filter-group">
        <button class="filter-btn active" data-filter="all">Tất Cả</button>
        <button class="filter-btn" data-filter="normal">Normal</button>
        <button class="filter-btn" data-filter="bulky">Bulky</button>
        <button class="filter-btn" data-filter="freight">Freight</button>
      </div>
    </div>

    <!-- ═══ KPI Cards ═══ -->
    <div class="kpi-grid" id="kpi-grid"></div>

    <!-- ═══ Main Content ═══ -->
    <div class="content-grid">

      <!-- Pivot Table -->
      <div class="table-card animate-in delay-3">
        <div class="card-header">
          <div class="card-title">📋 Chi Tiết Theo Nhóm Kho × Thời Gian Tồn</div>
        </div>
        <div class="table-wrapper">
          <table class="pivot-table" id="pivot-table">
            <thead>
              <tr>
                <th>Đích đến</th>
                <th>0-6h</th>
                <th>6-12h</th>
                <th>12-24h</th>
                <th>24-36h</th>
                <th>36-48h</th>
                <th>48-72h</th>
                <th>72-96h</th>
                <th>96-120h</th>
                <th>120h+</th>
                <th>Tổng</th>
              </tr>
            </thead>
            <tbody id="pivot-body"></tbody>
          </table>
        </div>
      </div>

      <!-- Side Panel -->
      <div class="side-panel">
        <!-- Donut: Phân bổ theo nhóm -->
        <div class="chart-card animate-in delay-4">
          <div class="card-title">🎯 Phân Bổ Theo Nhóm Kho</div>
          <div class="donut-container" id="donut-group"></div>
        </div>

        <!-- Bar: Thời gian tồn -->
        <div class="chart-card animate-in delay-5">
          <div class="card-title">⏱️ Phân Bổ Thời Gian Tồn</div>
          <div class="bar-chart" id="aging-bars"></div>
        </div>
      </div>
    </div>

    <!-- ═══ Destination Detail ═══ -->
    <div class="section" style="margin-top: 20px;">
      <div class="section-header">
        <div class="section-title"><span class="icon">🗺️</span> Chi Tiết Đích Đến Theo Nhóm</div>
      </div>
      <div class="dest-grid" id="dest-grid"></div>
    </div>

  </div>

  <script>
  /* ═══════════════════════════════════════════════════
     Dashboard Logic
     ═══════════════════════════════════════════════════ */
  (function() {
    'use strict';

    const rawData = window.TONKHO_DATA;
    if (!rawData) { 
      document.body.innerHTML = '<h2 style="color:#f87171;text-align:center;padding:80px">❌ Không có dữ liệu. Chạy: python3 export_tonkho_v2.py</h2>'; 
      return; 
    }

    const AGING_KEYS = ['1. 0-6','2. 6-12','3. 12-24','4. 24-36','5. 36-48','6. 48-72','7. 72-96','8. 96-120','9. 120+'];
    const COLORS = ['#fb923c','#60a5fa','#34d399','#a78bfa','#f87171','#22d3ee','#fbbf24'];

    const fmt = n => n != null ? n.toLocaleString('vi-VN') : '0';
    const pct = (n, t) => t ? ((n / t) * 100).toFixed(1) + '%' : '0%';

    // ── Update time ──
    document.getElementById('update-time').textContent = 'Cập nhật: ' + rawData.updated;

    // Hàm render chính
    function renderDashboard(filterType) {
      const currentRaw = window.TONKHO_DATA || rawData;
      let D = currentRaw;
      if (currentRaw[filterType]) {
        D = currentRaw[filterType];
      } else if (filterType !== 'all') {
        D = { grand_total: 0, routes: [], destinations: {} };
      }

      // ── KPI Cards ──
      const vung = D.destinations?.by_vung || {};
      const totalGT24 = D.routes ? D.routes.reduce((s, r) => {
        const a = r.aging || {};
        return s + (a['4. 24-36']||0) + (a['5. 36-48']||0) + (a['6. 48-72']||0) + (a['7. 72-96']||0) + (a['8. 96-120']||0) + (a['9. 120+']||0);
      }, 0) : 0;

      const kpis = [
        { label: 'Tổng Đơn Tồn', value: fmt(D.grand_total), sub: (D.routes ? D.routes.length : 0) + ' nhóm kho' },
        { label: 'Liên Vùng', value: fmt(vung['Liên Vùng']||0), sub: pct(vung['Liên Vùng']||0, D.grand_total) + ' tổng' },
        { label: 'Nội Vùng', value: fmt(vung['Nội vùng']||0), sub: pct(vung['Nội vùng']||0, D.grand_total) + ' tổng' },
        { label: 'Nội Thành', value: fmt(vung['Nội thành']||0), sub: pct(vung['Nội thành']||0, D.grand_total) + ' tổng' },
        { label: 'Tồn > 24h', value: fmt(totalGT24), sub: pct(totalGT24, D.grand_total) + ' — cần xử lý' },
      ];

      const kpiGrid = document.getElementById('kpi-grid');
      kpiGrid.innerHTML = ''; 
      kpis.forEach((k, i) => {
        const card = document.createElement('div');
        card.className = 'kpi-card animate-in delay-' + (i + 1);
        card.innerHTML = `
          <div class="kpi-label">${k.label}</div>
          <div class="kpi-value">${k.value}</div>
          <div class="kpi-sub">${k.sub}</div>`;
        kpiGrid.appendChild(card);
      });

      // ── Pivot Table ──
      const tbody = document.getElementById('pivot-body');
      tbody.innerHTML = ''; 
      if (D.routes && D.routes.length > 0) {
        D.routes.forEach((route, ri) => {
          // Parent row
          const pr = document.createElement('tr');
          pr.className = 'group-parent';
          pr.dataset.group = ri;
          let cells = `<td><span class="group-toggle" id="toggle-${ri}">▼</span> ${route.name}</td>`;
          AGING_KEYS.forEach(k => {
            const v = (route.aging || {})[k] || 0;
            cells += `<td class="${v === 0 ? 'zero' : agingClass(k, v)}">${v ? fmt(v) : '—'}</td>`;
          });
          cells += `<td>${fmt(route.total)}</td>`;
          pr.innerHTML = cells;
          pr.addEventListener('click', () => toggleGroup(ri));
          tbody.appendChild(pr);

          // Children
          route.children.forEach(child => {
            const cr = document.createElement('tr');
            cr.className = 'group-child group-' + ri;
            let cc = `<td>${child.short_name || child.name}</td>`;
            AGING_KEYS.forEach(k => {
              const v = (child.aging || {})[k] || 0;
              cc += `<td class="${v === 0 ? 'zero' : agingClass(k, v)}">${v ? fmt(v) : '—'}</td>`;
            });
            cc += `<td>${fmt(child.total)}</td>`;
            cr.innerHTML = cc;
            tbody.appendChild(cr);
          });
        });

        // Grand total
        const gtr = document.createElement('tr');
        gtr.className = 'grand-total';
        let gtCells = '<td>Grand Total</td>';
        AGING_KEYS.forEach(k => {
          const v = D.routes.reduce((s, r) => s + ((r.aging || {})[k] || 0), 0);
          gtCells += `<td>${fmt(v)}</td>`;
        });
        gtCells += `<td>${fmt(D.grand_total)}</td>`;
        gtr.innerHTML = gtCells;
        tbody.appendChild(gtr);
      } else {
        tbody.innerHTML = '<tr><td colspan="11" style="text-align:center;padding:40px;color:var(--text-muted);font-family:\'Inter\',sans-serif">Không có đơn hàng nào thuộc nhóm này</td></tr>';
      }

      // ── Donut Chart ──
      const donutEl = document.getElementById('donut-group');
      donutEl.innerHTML = ''; 
      const total = D.grand_total;
      
      if (total > 0 && D.routes && D.routes.length > 0) {
        let angleStart = 0;
        const slices = D.routes.map((r, i) => ({
          name: r.name, value: r.total, color: COLORS[i % COLORS.length],
          pct: (r.total / total * 100)
        }));

        let svgPaths = '';
        slices.forEach(s => {
          let angle = (s.value / total) * 360;
          if (angle >= 360) angle = 359.99; // Tránh lỗi góc 360 độ khiến SVG biến mất
          svgPaths += describeArc(70, 70, 52, angleStart, angleStart + angle - (angle >= 359.99 ? 0 : 0.5), s.color);
          angleStart += angle;
        });

        donutEl.innerHTML = `
          <svg class="donut-svg" viewBox="0 0 140 140">
            ${svgPaths}
            <circle cx="70" cy="70" r="36" fill="var(--bg-secondary)"/>
            <text x="70" y="66" text-anchor="middle" fill="var(--text-primary)" font-size="15" font-weight="800" font-family="JetBrains Mono">${(total/1000).toFixed(0)}K</text>
            <text x="70" y="82" text-anchor="middle" fill="var(--text-muted)" font-size="9" font-family="Inter">đơn hàng</text>
          </svg>
          <div class="donut-legend">
            ${slices.map(s => `
              <div class="legend-item">
                <span class="legend-color" style="background:${s.color}"></span>
                <span class="legend-name">${s.name}</span>
                <span class="legend-value">${fmt(s.value)}</span>
                <span class="legend-pct">${s.pct.toFixed(1)}%</span>
              </div>
            `).join('')}
          </div>`;
      } else {
        donutEl.innerHTML = '<div style="margin:auto;color:var(--text-muted);font-size:0.9rem">Không có dữ liệu biểu đồ</div>';
      }

      // ── Aging Bars ──
      const agingEl = document.getElementById('aging-bars');
      agingEl.innerHTML = ''; 
      if (total > 0 && D.routes && D.routes.length > 0) {
        const agingTotals = AGING_KEYS.map(k => D.routes.reduce((s, r) => s + ((r.aging || {})[k] || 0), 0));
        const maxAging = Math.max(...agingTotals);

        agingTotals.forEach((v, i) => {
          const barClass = i <= 1 ? 'safe' : i <= 3 ? 'warn' : 'danger';
          const width = maxAging ? (v / maxAging * 100) : 0;
          const item = document.createElement('div');
          item.className = 'bar-item';
          item.innerHTML = `
            <span class="bar-label">${AGING_KEYS[i].replace(/^\d+\.\s*/, '')}h</span>
            <div class="bar-track">
              <div class="bar-fill ${barClass}" style="width:0%"></div>
            </div>
            <span class="bar-count">${fmt(v)}</span>`;
          agingEl.appendChild(item);
          // Animate
          requestAnimationFrame(() => {
            setTimeout(() => {
              const el = item.querySelector('.bar-fill');
              if (el) el.style.width = width + '%';
            }, 100 + i * 40);
          });
        });
      } else {
        agingEl.innerHTML = '<div style="margin:auto;color:var(--text-muted);font-size:0.9rem">Không có dữ liệu thời gian tồn</div>';
      }

      // ── Destination Cards ──
      const destGrid = document.getElementById('dest-grid');
      destGrid.innerHTML = ''; 
      if (D.routes && D.routes.length > 0) {
        D.routes.forEach((route, ri) => {
          const card = document.createElement('div');
          card.className = 'dest-card animate-in';
          card.style.animationDelay = (0.05 + ri * 0.03) + 's';

          const childrenSorted = [...route.children].sort((a, b) => b.total - a.total);
          const childrenHtml = childrenSorted.map(c => `
            <div class="dest-row">
              <span class="name">${c.short_name || c.name}</span>
              <span class="count">${fmt(c.total)}</span>
              <span class="pct">${pct(c.total, route.total)}</span>
            </div>`).join('');

          card.innerHTML = `
            <div class="dest-card-header">
              <h3>${route.name}</h3>
              <span class="total">${fmt(route.total)}</span>
            </div>
            <div class="dest-list">${childrenHtml}</div>`;
          destGrid.appendChild(card);
        });
      }
    }

    function agingClass(key, val) {
      if (!val) return '';
      const idx = AGING_KEYS.indexOf(key);
      if (idx <= 1) return 'aging-safe';
      if (idx <= 3) return 'aging-warn';
      return 'aging-danger';
    }

    function toggleGroup(gi) {
      const rows = document.querySelectorAll('.group-' + gi);
      const toggle = document.getElementById('toggle-' + gi);
      const hidden = rows[0]?.style.display === 'none';
      rows.forEach(r => r.style.display = hidden ? '' : 'none');
      if (toggle) {
        toggle.textContent = hidden ? '▼' : '▶';
        toggle.classList.toggle('collapsed', !hidden);
      }
    }

    function describeArc(cx, cy, r, startAngle, endAngle, color) {
      const s = polarToCartesian(cx, cy, r, endAngle);
      const e = polarToCartesian(cx, cy, r, startAngle);
      const large = endAngle - startAngle > 180 ? 1 : 0;
      return `<path d="M ${s.x} ${s.y} A ${r} ${r} 0 ${large} 0 ${e.x} ${e.y}" fill="none" stroke="${color}" stroke-width="14" stroke-linecap="round"/>`;
    }

    function polarToCartesian(cx, cy, r, deg) {
      const rad = (deg - 90) * Math.PI / 180;
      return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
    }

    // ── Setup Filter Event Listeners ──
    const filterContainer = document.getElementById('filter-container');
    if (filterContainer) {
      filterContainer.addEventListener('click', (e) => {
        const btn = e.target.closest('.filter-btn');
        if (!btn || btn.classList.contains('active')) return;
        
        filterContainer.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        const filterVal = btn.dataset.filter;
        localStorage.setItem('ktc_filter_type', filterVal); // Khắc phục đề xuất 1
        renderDashboard(filterVal);
      });
    }

    // Khắc phục đề xuất 1: Đọc và kích hoạt bộ lọc đã chọn trước đó
    const savedFilter = localStorage.getItem('ktc_filter_type') || 'all';
    if (filterContainer) {
      const targetBtn = filterContainer.querySelector(`[data-filter="${savedFilter}"]`);
      if (targetBtn) {
        filterContainer.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        targetBtn.classList.add('active');
      }
    }

    // Render ban đầu
    renderDashboard(savedFilter);

    // Khắc phục đề xuất 2: Tự động tải lại script dữ liệu mới mỗi 10 phút (không cần reload trang)
    function autoRefreshData() {
      const oldScript = document.getElementById('tonkho-data-script');
      if (oldScript) oldScript.remove();
      
      const script = document.createElement('script');
      script.id = 'tonkho-data-script';
      script.src = 'tonkho_data.js?t=' + Date.now();
      script.onload = () => {
        const activeBtn = document.querySelector('.filter-btn.active');
        const currentFilter = activeBtn ? activeBtn.dataset.filter : 'all';
        const updateTimeEl = document.getElementById('update-time');
        if (updateTimeEl && window.TONKHO_DATA) {
          updateTimeEl.textContent = 'Cập nhật: ' + window.TONKHO_DATA.updated;
        }
        renderDashboard(currentFilter);
        console.log('🔄 Dashboard auto-refreshed successfully at ' + new Date().toLocaleTimeString());
      };
      document.head.appendChild(script);
    }
    
    // Refresh mỗi 10 phút (600,000ms)
    setInterval(autoRefreshData, 600000);

  })();
  </script>
</body>
</html>
